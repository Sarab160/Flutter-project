name: project_final
description: Air Sense AQI Prediction App
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.11.0
  firebase_auth: ^5.5.0
  cloud_firestore: ^5.6.0
  share_plus: ^13.1.0
  google_sign_in: ^6.2.1
  url_launcher: ^6.3.1
  shared_preferences: ^2.5.5
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/scaler_params.json
    - assets/label_mapping.json
    - assets/model_weights.json